    <link href="/css/theme.css" rel="stylesheet" type="text/css" media="all">
    <link href="/css/theme-colors/blog.css" rel="stylesheet" type="text/css" media="all">

<body>
    <div id="content">
        <div id="title-mobile" class="box">
            <img src="/img/logos/blog.gif" height="55px" id="title-img">

        <div id="navbar" class="box">
            <div id="navbar-title">
                <a href="/"><img src="/img/logos/blog.gif" height="55px"></a>

            <div id="navbar-buttons">
                <div id="navbar-buttons-set">
                    <a href="/blog/"><img src="/img/btnicons/document-text-svgrepo-com.svg"> blog</a>

                </div>

                </div>
            </a>

        <div class="long-box">

                <iframe  
                style="width: 100%; border-radius: var(--box-content-radius); border-style:none; height:960px;"
                src="https://sushiwt.tumblr.com">

                </iframe>
            </div>
        </div>
        
        <div class="long-box"> 
            <div class="box">
                <p  style="margin:auto; text-align: center; font-size:20px;">I went the lazy route and did an iframe instead :P <br>

            </div>

        <div class="text-only-box" id="made-by-message" align="center">
                <div class="box">built with firefox/chrome and vscode<hr>made by sushi, 2024 - 2026.</div>
